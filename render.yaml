services:
  - type: web
    name: makai-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT makai.asgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: DATABASE_URL
        fromDatabase:
          name: makai-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: "makai-2-0.onrender.com,.onrender.com"

  - type: worker
    name: makai-celery-worker
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "celery -A makai worker --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: makai-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false

databases:
  - name: makai-db
    databaseName: makai
    user: makai_user
    plan: free
